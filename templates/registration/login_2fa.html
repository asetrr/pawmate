{% extends 'base.html' %}
{% block title %}PawMate | Подтверждение входа{% endblock %}
{% block content %}
<section class="card auth-card">
  <div class="badge">🛡️ Двухфакторный вход</div>
  <h1>Подтверди вход кодом</h1>
  <p class="form-meta">Мы отправили код на <strong>{{ masked_email }}</strong>.</p>
  <form method="post" class="stack-form">
    {% csrf_token %}
    <label>
      Код из письма
      <input type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" minlength="6" maxlength="6" placeholder="000000" required>
    </label>
    <button class="btn primary" type="submit">Подтвердить вход</button>
  </form>
  <form method="post" action="{% url 'login_2fa_resend' %}" class="stack-form" style="margin-top:10px;">
    {% csrf_token %}
    <button class="btn ghost" type="submit">Отправить код снова</button>
  </form>
</section>
{% endblock %}
