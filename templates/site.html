<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetSwipe - Матчи для питомцев</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: white;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120,219,255,0.2) 0%, transparent 50%);
            z-index: -1;
        }
        
        .app {
            max-width: 380px;
            height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #00f5ff 0%, #ff00ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .counter {
            margin-left: auto;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .stack {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            padding: 20px;
        }
        
        .card {
            width: 100%;
            max-width: 340px;
            height: 520px;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            cursor: grab;
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform;
        }
        
        .card:active {
            cursor: grabbing;
        }
        
        .card.liked {
            transform: translateX(200px) rotate(15deg) scale(0.95) !important;
        }
        
        .card.disliked {
            transform: translateX(-200px) rotate(-15deg) scale(0.95) !important;
        }
        
        .card-image {
            width: 100%;
            height: 65%;
            object-fit: cover;
        }
        
        .card-content {
            padding: 24px;
            height: 35%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .pet-name {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, white 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .pet-info {
            display: flex;
            gap: 16px;
            font-size: 16px;
            color: rgba(255,255,255,0.8);
        }
        
        .pet-desc {
            font-size: 16px;
            line-height: 1.5;
            color: rgba(255,255,255,0.9);
        }
        
        .actions {
            padding: 24px;
            display: flex;
            justify-content: space-between;
            gap: 24px;
        }
        
        .action-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .action-btn:hover {
            transform: scale(1.1);
        }
        
        .action-btn:active {
            transform: scale(0.95);
        }
        
        .nope {
            background: rgba(255, 71, 87, 0.2);
            border: 2px solid rgba(255, 71, 87, 0.4);
            color: #ff4757;
        }
        
        .yep {
            background: rgba(46, 213, 115, 0.2);
            border: 2px solid rgba(46, 213, 115, 0.4);
            color: #2ed573;
            font-size: 24px;
        }
        
        .no-cards {
            text-align: center;
            padding: 60px 40px;
            color: rgba(255,255,255,0.6);
        }
        
        .no-cards h2 {
            font-size: 24px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #00f5ff 0%, #ff00ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        @media (max-width: 400px) {
            .app { max-width: 100vw; }
            .card { max-width: calc(100vw - 40px); height: 500px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">PetSwipe</div>
            <div class="counter" id="counter">4/4</div>
        </div>
        
        <div class="stack" id="stack">
            <!-- Карточки добавляются JS -->
        </div>
        
        <div class="actions">
            <button class="action-btn nope" onclick="swipe('nope')">✕</button>
            <button class="action-btn yep" onclick="swipe('yep')">💚</button>
        </div>
    </div>

    <script>
        const pets = [
            {
                name: 'Макс',
                breed: 'Хаски',
                age: '2.5 года',
                desc: 'Любит бегать, копать ямы и красть носки. Ищет активного друга для приключений.',
                img: 'https://images.unsplash.com/photo-1552053831-71594a27632d?w=450&fit=crop'
            },
            {
                name: 'Луна',
                breed: 'Бирманская',
                age: '1.8 года',
                desc: 'Королева подушек. Нежная, ласковая, обожает смотреть в окно и мурлыкать.',
                img: 'https://images.unsplash.com/photo-1530575791178-1f1921b753d1?w=450&fit=crop'
            },
            {
                name: 'Бадди',
                breed: 'Французский бульдог',
                age: '3 года',
                desc: 'Забавный короткошерстный обжора. Спит 20 часов в сутки, ест — остальные 4.',
                img: 'https://images.unsplash.com/photo-1560807707-8cc77767d783?w=450&fit=crop'
            },
            {
                name: 'Рокси',
                breed: 'Абиссинская',
                age: '1 год',
                desc: 'Дикая амазонка! Лазает по шторам, охотится на лазер и требует постоянного внимания.',
                img: 'https://images.unsplash.com/photo-1573865526739-10659fec78a5?w=450&fit=crop'
            }
        ];

        let currentIndex = 0;
        const stack = document.getElementById('stack');
        const counter = document.getElementById('counter');

        function renderCard() {
            stack.innerHTML = '';
            
            if (currentIndex >= pets.length) {
                stack.innerHTML = `
                    <div class="no-cards">
                        <h2>Всех просканировал! 🔥</h2>
                        <p>Матчи уже в уведомлениях</p>
                    </div>
                `;
                return;
            }

            counter.textContent = `${pets.length - currentIndex}/${pets.length}`;
            
            const pet = pets[currentIndex];
            const card = document.createElement('div');
            card.className = 'card';
            card.draggable = true;
            card.innerHTML = `
                <img src="${pet.img}" alt="${pet.name}" class="card-image">
                <div class="card-content">
                    <div class="pet-name">${pet.name}</div>
                    <div class="pet-info">
                        <span>${pet.breed}</span>
                        <span>•</span>
                        <span>${pet.age}</span>
                    </div>
                    <div class="pet-desc">${pet.desc}</div>
                </div>
            `;
            
            card.addEventListener('dragstart', dragStart);
            card.addEventListener('dragend', dragEnd);
            stack.appendChild(card);
        }

        function swipe(dir) {
            const card = stack.querySelector('.card');
            if (card) {
                card.classList.add(dir);
                setTimeout(() => {
                    currentIndex++;
                    renderCard();
                }, 400);
            }
        }

        function dragStart(e) {
            this.style.transition = 'none';
        }

        function dragEnd(e) {
            this.style.transition = '';
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            
            if (x < rect.width * 0.3) {
                swipe('nope');
            } else if (x > rect.width * 0.7) {
                swipe('yep');
            }
        }

        renderCard();
    </script>
</body>
</html>
