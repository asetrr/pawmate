name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: pawmate
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d pawmate"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for database and redis
        run: |
          python - <<'PY'
          import socket
          import time

          def wait(host, port, timeout=60):
              start = time.time()
              while time.time() - start < timeout:
                  try:
                      sock = socket.create_connection((host, port), 2)
                      sock.close()
                      return
                  except OSError:
                      time.sleep(2)
              raise SystemExit(f'Cannot connect to {host}:{port}')

          wait('127.0.0.1', 5432)
          wait('127.0.0.1', 6379)
          PY

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://user:password@127.0.0.1:5432/pawmate
          CACHE_URL: redis://127.0.0.1:6379/0
          CELERY_BROKER_URL: redis://127.0.0.1:6379/1
          CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/2
          DJANGO_DEBUG: True
        run: python manage.py migrate --noinput

      - name: Run tests
        env:
          DATABASE_URL: postgresql://user:password@127.0.0.1:5432/pawmate
          CACHE_URL: redis://127.0.0.1:6379/0
          CELERY_BROKER_URL: redis://127.0.0.1:6379/1
          CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/2
          DJANGO_DEBUG: True
        run: python manage.py test core.tests

      - name: Validate Docker build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false

      - name: Validate docker-compose configuration
        run: docker compose config
